<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shake Rotation</title>
   
<!-- Make page scale -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* =========================
   BASIC PAGE STYLING
   ========================= */
body {
    font-family: Arial, sans-serif;
    background: black;
    color: white;
    text-align: center;
    padding: 40px;
    margin: 0;
    font-size: 14px;
    line-height: 1.5;
}

/* Main card container */
.card {
    background: white;
    max-width: 600px;
    color: black;
    margin: auto;
    padding: 15px;
    margin-bottom: 40px; /* spacing below card container */
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    transition: opacity 0.4s ease-in-out;
}

/* Fade animation */
.fade {
    opacity: 0;
}

button {
    padding: 10px 20px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: transform 0.2s ease;
}

button:hover {
    transform: scale(1.05);
}

.generate-btn {
    background-color: #2e7d32;
    color: white;
}

.reset-btn {
    background-color: #c62828;
    color: white;
}

/* History panel */
.history ul { 
    list-style: none;
    margin: 0;
    margin-left: 0;
    padding-left: 0;
    max-height: 400px;
    overflow-y: auto;
}
   
/*History panel, line between weeks */
.history li {
    padding: 12px 0; /*space above and below each week */
    border-bottom: 1px solid #ccc; /* separator line*/
}
   
/* "History" title */   
.history h3 {
   margin-bottom: 10px; 
   padding: 6px 12px;
   border: 1px solid #2e7d32;
   border-radius: 8px;
   display: inlinve-block;
   cursor: pointer;
}

/* Clickable ingredient styling */
.ingredient {
    cursor: pointer;
    display: inline-block;
    margin: 4px;
    padding: 4px 8px;
    border-radius: 6px;
    transition: background 0.2s ease;
}

.ingredient:hover {
    background: #e0f2f1;
}

.selected {
    background: #c8e6c9;
    font-weight: bold;
}

</style>
</head>
<body>

<h1>Shake Rotation System</h1>

<div class="card" id="shakeCard">
    <h2 id="weekTitle">Week 1</h2>
    <div id="ingredients"></div>

    <button class="generate-btn" onclick="generateWeek()">Generate Next Week</button>
    <button class="reset-btn" onclick="resetCycle()">Reset Cycle</button>
</div>

<!-- ===========================
     Nutrient Intelligence Panel
     =========================== -->
<div class="card" id="nutrientPanel" style="display:none;">
    <h2>Nutrient Intelligence</h2>
    <div id="nutrientContent"></div>
    <button onclick="clearSelection()">Clear Selection</button>
</div>

<div class="history">
    <h3 id="historyToggle" onclick="toggleHistory()">History</h3>
    <ul id="historyList" style="display: none;"></ul>
</div>

<script>
/* ====================================================
   MASTER FOOD POOLS (4-week structured rotation)
   ==================================================== */

/* Vegetables divided by category
   We rotate 1 from each category per week */

const leafyGreens = [
    "Spinach",
    "Kale",
    "Swiss Chard",
    "Arugula"
];

const cruciferous = [
    "Broccoli",
    "Red Cabbage",
    "Brussels Sprouts",
    "Cauliflower"
];

const antioxidantVeg = [
    "Beets",
    "Carrots",
    "Red Bell Pepper",
    "Zucchini",
    "Cucumber"
];

/* Fruits (8 total, 2 per week, controlled offset rotation) */
const fruits = [
    "Blueberries",
    "Apple", 
    "Blackberries",
    "Pomegranate",
    "Rasberries",
    "Grapefruit", 
    "Orange", 
    "Kiwi"
];

/* Roots (8 total, 2 per week) */
const roots = [
    "Turmeric Root + black pepper",
    "Garlic",
    "Ginger Root",
    "Burdock Root"
    /*"Dandelion Root",
    "Maca Root",
    "Galangal",
    "Horseradish Root",*/
];

/* Seeds (8 total, 2 per week) */
const seeds = [
    "Brown Flaxseed",
    "Pumpkin Seeds"
    /*"Chia Seeds",
    "Watermelon Seeds",
    "Sesame Seeds",
    "Black Sesame",
    "Sunflower Seeds",
    "Nigella Seeds"*/
];

/* ====================================================
   NUTRIENT DATABASE (Intensity Included)
   ==================================================== */

const nutrientDB = {

    "Spinach": {
        organs: ["Brain", "Liver", "Heart"],
        nutrients: {
            iron: "high",
            folate: "high",
            magnesium: "moderate",
            vitamin_k: "high"
        }
    },

    "Blueberries": {
        organs: ["Brain", "Cardiovascular"],
        nutrients: {
            vitamin_c: "moderate",
            anthocyanins: "high",
            fiber: "moderate"
        }
    },

    "Broccoli": {
        organs: ["Liver", "Brain", "Cellular"],
        nutrients: {
            sulforaphane: "high",
            vitamin_c: "high",
            fiber: "moderate"
        }
    },

    "Red Bell Pepper": {
        organs: ["Immune", "Skin", "Brain"],
        nutrients: {
            vitamin_c: "very high",
            beta_carotene: "moderate"
        }
    }

};

/* ====================================================
   SELECTION + DYNAMIC CALCULATION ENGINE
   ==================================================== */

let selectedItems = [];

// Handle selecting/unselecting ingredients
function toggleSelect(element, itemName) {

    if (selectedItems.includes(itemName)) {
        selectedItems = selectedItems.filter(i => i !== itemName);
        element.classList.remove("selected");
    } else {
        if (selectedItems.length >= 3) return; // limit to 3
        selectedItems.push(itemName);
        element.classList.add("selected");
    }

    updateNutrientPanel();
}

// Clear all selections
function clearSelection() {
    selectedItems = [];
    document.querySelectorAll(".ingredient").forEach(el => el.classList.remove("selected"));
    document.getElementById("nutrientPanel").style.display = "none";
}

/* ====================================================
   DYNAMIC NUTRIENT CALCULATION
   ==================================================== */
   
function updateNutrientPanel() {

    if (selectedItems.length === 0) {
        document.getElementById("nutrientPanel").style.display = "none";
        return;
    }

    document.getElementById("nutrientPanel").style.display = "block";

    let organMap = {};
    let nutrientMap = {};

    selectedItems.forEach(item => {

        const data = nutrientDB[item];
        if (!data) return;

        // Count organ frequency
        data.organs.forEach(org => {
            organMap[org] = (organMap[org] || 0) + 1;
        });

        // Merge nutrients
        for (let nutrient in data.nutrients) {
            nutrientMap[nutrient] = data.nutrients[nutrient];
        }
    });

    // Build organ display
    const organList = Object.keys(organMap)
        .sort((a, b) => organMap[b] - organMap[a])
        .join(", ");

    // Build nutrient display
    const nutrientList = Object.entries(nutrientMap)
        .map(([key, val]) => `${key} (${val})`)
        .join("<br>");

    document.getElementById("nutrientContent").innerHTML = `
        <h3>Supports:</h3>
        <p>${organList}</p>
        <h3>Key Nutrients:</h3>
        <p>${nutrientList}</p>
    `;
}

/* ====================================================
   LOAD SAVED DATA FROM LOCAL STORAGE
   ==================================================== */

let currentWeek = localStorage.getItem("currentWeek")
    ? parseInt(localStorage.getItem("currentWeek"))
    : 0;

let history = localStorage.getItem("shakeHistory")
    ? JSON.parse(localStorage.getItem("shakeHistory"))
    : [];

/* ====================================================
   MAIN GENERATION FUNCTION
   ==================================================== */

function generateWeek() {

    const card = document.getElementById("shakeCard");
    card.classList.add("fade"); // Trigger fade animation

    setTimeout(() => {

        // Ensure 4-week cycle (0–3)
        const weekIndex = currentWeek % 4;

        // Category-balanced vegetable selection
        const veg1 = leafyGreens[weekIndex];
        const veg2 = cruciferous[weekIndex];
        const veg3 = antioxidantVeg[weekIndex];

        // Controlled fruit rotation (offset math spreads usage)
        const fruit1 = fruits[(weekIndex * 2) % fruits.length];
        const fruit2 = fruits[(weekIndex * 2 + 1) % fruits.length];

        // Controlled root rotation
        const root1 = roots[(weekIndex * 2) % roots.length];
        const root2 = roots[(weekIndex * 2 + 1) % roots.length];

        // Controlled seed rotation
        const seed1 = seeds[(weekIndex * 2) % seeds.length];
        const seed2 = seeds[(weekIndex * 2 + 1) % seeds.length];

        const weekData = {
            week: weekIndex + 1,
            vegetables: [veg1, veg2, veg3],
            fruits: [fruit1, fruit2],
            roots: [root1, root2],
            seeds: [seed1, seed2]
        };

        displayWeek(weekData);
        saveHistory(weekData);

        currentWeek++;
        localStorage.setItem("currentWeek", currentWeek);

        card.classList.remove("fade");

    }, 300);
}

/* ====================================================
   DISPLAY WEEK DATA
   ==================================================== */

function displayWeek(data) {

    document.getElementById("weekTitle").innerText = "Week " + data.week;

    // Combine all items into one array
    const allItems = [
        ...data.vegetables,
        ...data.fruits,
        ...data.roots,
        ...data.seeds
    ];

    // Render clickable ingredients
    document.getElementById("ingredients").innerHTML =
        allItems.map(item =>
            `<span class="ingredient" onclick="toggleSelect(this, '${item}')">${item}</span>`
        ).join(" ");
}

/* ====================================================
   SAVE & DISPLAY HISTORY
   ==================================================== */

function saveHistory(data) {

    history.push(data);

    localStorage.setItem("shakeHistory", JSON.stringify(history));

    renderHistory();
}

function renderHistory() {

    const list = document.getElementById("historyList");
    list.innerHTML = "";

    history.forEach(item => {
        const li = document.createElement("li");
        li.innerText =
            `Week ${item.week}: ` +
            `${item.vegetables.join(", ")} | ` +
            `${item.fruits.join(", ")} | ` +
            `${item.roots.join(", ")} | ` +
            `${item.seeds.join(", ")}`;
        list.appendChild(li);
    });
}

/* ====================================================
   RESET FUNCTION
   ==================================================== */

function resetCycle() {

    if (confirm("Reset the entire 4-week cycle?")) {
        localStorage.clear();
        currentWeek = 0;
        history = [];
        renderHistory();
        document.getElementById("ingredients").innerHTML = "";
        document.getElementById("weekTitle").innerText = "Week 1";
    }
}

/* ====================================================
   TOGGLE HISTORY
   ==================================================== */
function toggleHistory() {
    const historyList = document.getElementById("historyList");

    if (historyList.style.display === "none") {
       historyList.style.display = "block";
    } else {
       historyList.style.display = "none";
    }
}

/* ====================================================
   INITIAL LOAD
   ==================================================== */

renderHistory();

</script>

</body>
</html>
