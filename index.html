<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Green Cycle</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    font-family: Arial, sans-serif;
    background: black;
    color: white;
    text-align: center;
    padding: 40px;
    margin: 0;
    font-size: 14px;
    line-height: 1.5;
}

.card {
    background: white;
    max-width: 600px;
    color: black;
    margin: auto;
    padding: 15px;
    margin-bottom: 40px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    transition: opacity 0.4s ease-in-out;
}

.fade { opacity: 0; }

button {
    padding: 10px 20px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: transform 0.2s ease;
}

button:hover { transform: scale(1.05); }

/* History panel */
.history ul {
    list-style: none;
    margin: 0;
    padding-left: 0;
    max-height: 400px;
    overflow-y: auto;
}
.history li {
    padding: 12px 0;
    border-bottom: 1px solid #ccc;
}
.history h3 {
    margin-bottom: 10px;
    padding: 6px 12px;
    border: 1px solid #2e7d32;
    border-radius: 8px;
    display: inline-block;
    cursor: pointer;
}

/* Ingredient layout */
.category {
    margin-bottom: 12px;
    text-align: left;
}
.ingredient-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 6px;
}

/* Ingredient chip states */
.ingredient {
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 20px;
    border: 1px solid #2e7d32;
    background: #f5f5f5;
    font-size: 13px;
    transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
}
.ingredient:hover { box-shadow: 0 0 0 2px #2e7d32; }
.selected {
    background: #2e7d32;
    color: white;
    border-color: #2e7d32;
}
/* ── PERSISTENT SELECTION PANEL ── */
#selectionPanel {
    display: none;
    text-align: left;
    background: #e8f5e9;
    border-left: 3px solid #2e7d32;
    border-radius: 6px;
    padding: 10px 12px;
    margin-top: 10px;
    font-size: 12px;
    color: #1b5e20;
}
#selectionPanel .panel-heading {
    font-weight: bold;
    font-size: 13px;
    color: #1b5e20;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
#selectionPanel .clear-btn {
    font-size: 11px;
    color: #888;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    font-weight: normal;
    margin: 0;
}
#selectionPanel .clear-btn:hover {
    color: #c62828;
    transform: none;
}
#selectionPanel .panel-section { margin-top: 6px; }
#selectionPanel .panel-label {
    font-size: 11px;
    font-weight: bold;
    color: #388e3c;
    margin-bottom: 4px;
}
#selectionPanel .chip-row {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 2px;
}
#selectionPanel .item-chip {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: #2e7d32;
    color: white;
}
#selectionPanel .organ-tag {
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 10px;
    background: #b2dfdb;
    color: #004d40;
}
#selectionPanel .nutrient-row {
    font-size: 12px;
    color: #1b5e20;
    margin: 3px 0;
}
#selectionPanel .nutrient-level {
    color: #777;
    font-style: italic;
}
#selectionPanel .divider {
    border: none;
    border-top: 1px solid #c8e6c9;
    margin: 8px 0;
}

/* ── WEEK NAV ── */
.week-nav-btn {
    background: #f5f5f5;
    border: 1px solid #ddd;
    color: #333;
    padding: 6px 12px;
    font-size: 20px;
    font-weight: 900;
    border-radius: 6px;
    cursor: pointer;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s ease, color 0.2s ease;
}
.week-nav-btn:hover {
    background: #2e7d32;
    color: white;
    transform: scale(1.05);
}


</style>
</head>
<body>

<h1>The Green Cycle</h1>

<!-- MAIN SHAKE CARD -->
<div class="card" id="shakeCard">

    <!-- Header row -->
    <div style="display: flex; align-items: center; justify-content: center; gap: 16px;">
        <button class="week-nav-btn" onclick="previousWeek()">«</button>
        <div>
            <h2 id="weekTitle" style="margin: 0;">Week 1</h2>
        </div>
        <button class="week-nav-btn" onclick="nextWeek()">»</button>
    </div>

    <!-- Subtitle -->
    <p id="cardSubtitle" style="font-size:12px; opacity:0.6; margin:4px 0 8px 0; text-align:left; padding:0 4px;">
        Select ingredients to analyze nutrient synergy
    </p>

    <!-- Ingredients -->
    <div id="ingredients"></div>

    <!-- Persistent selection summary panel -->
    <div id="selectionPanel">
        <div class="panel-heading">
            <span>Selected</span>
            <button class="clear-btn" onclick="clearSelection()">✕ clear</button>
        </div>
        <div id="panelBody"></div>
    </div>

</div>

<!-- History -->
<div class="history">
    <h3 id="historyToggle" onclick="toggleHistory()">History</h3>
    <ul id="historyList" style="display:none;"></ul>
</div>

<script>
/* ====================================================
   MASTER FOOD POOLS
   ==================================================== */
const leafyGreens     = ["Spinach", "Kale", "Swiss Chard", "Arugula"];
const cruciferous     = ["Broccoli", "Red Cabbage", "Brussels Sprouts", "Cauliflower"];
const supplementalVeg = ["Beets", "Carrots", "Celery", "Zucchini", "Cucumber"];
const fruits = ["Blueberries", "Apple", "Blackberries", "Pomegranate", "Rasberries", "Grapefruit", "Orange", "Kiwi"];
const roots  = ["Turmeric Root + black pepper", "Garlic", "Ginger Root", "Burdock Root"];
const seeds  = ["Brown Flaxseed", "Pumpkin Seeds", "Brazil Nuts"];

/* ====================================================
   NUTRIENT DATABASE
   ==================================================== */
const nutrientDB = {
    "Spinach":          { organs: ["Brain","Liver","Heart"],              nutrients: { iron:"high", folate:"high", magnesium:"moderate", vitamin_k:"high", lutein:"moderate" } },
    "Kale":             { organs: ["Heart","Liver","Cellular"],           nutrients: { vitamin_k:"very high", vitamin_c:"high", beta_carotene:"high", fiber:"moderate" } },
    "Swiss Chard":      { organs: ["Heart","Brain","Blood"],              nutrients: { magnesium:"high", potassium:"moderate", vitamin_k:"high", iron:"moderate" } },
    "Arugula":          { organs: ["Cardiovascular","Liver"],             nutrients: { nitrates:"high", vitamin_k:"moderate", folate:"moderate" } },
    "Broccoli":         { organs: ["Liver","Brain","Cellular"],           nutrients: { sulforaphane:"high", vitamin_c:"high", fiber:"moderate" } },
    "Red Cabbage":      { organs: ["Brain","Cardiovascular"],             nutrients: { anthocyanins:"high", vitamin_c:"moderate", fiber:"moderate" } },
    "Brussels Sprouts": { organs: ["Liver","Gut"],                        nutrients: { sulforaphane:"moderate", fiber:"high", vitamin_k:"high" } },
    "Cauliflower":      { organs: ["Liver","Gut"],                        nutrients: { sulforaphane:"moderate", fiber:"moderate", vitamin_c:"moderate" } },
    "Beets":            { organs: ["Cardiovascular","Brain"],             nutrients: { nitrates:"high", betalains:"high", folate:"moderate" } },
    "Carrots":          { organs: ["Eyes","Immune"],                      nutrients: { beta_carotene:"very high", fiber:"moderate" } },
    "Celery":           { organs: ["Heart","Gut","Joints"],               nutrients: { vitamin_k:"high", potassium:"moderate", fiber:"moderate", phthalides:"high", antioxidants:"moderate" } },
    "Zucchini":         { organs: ["Gut","Heart"],                        nutrients: { vitamin_c:"moderate", potassium:"moderate", fiber:"low" } },
    "Cucumber":         { organs: ["Hydration","Skin"],                   nutrients: { vitamin_k:"low", antioxidants:"low" } },
    "Blueberries":      { organs: ["Brain","Cardiovascular"],             nutrients: { anthocyanins:"very high", vitamin_c:"moderate", fiber:"moderate" } },
    "Apple":            { organs: ["Gut","Heart"],                        nutrients: { quercetin:"moderate", fiber:"high", vitamin_c:"low" } },
    "Blackberries":     { organs: ["Brain","Gut"],                        nutrients: { anthocyanins:"high", fiber:"high", vitamin_c:"moderate" } },
    "Pomegranate":      { organs: ["Heart","Cellular"],                   nutrients: { punicalagins:"very high", antioxidants:"high" } },
    "Rasberries":       { organs: ["Gut","Brain"],                        nutrients: { fiber:"very high", vitamin_c:"moderate", ellagic_acid:"moderate" } },
    "Grapefruit":       { organs: ["Liver","Cardiovascular"],             nutrients: { vitamin_c:"high", naringin:"high", fiber:"moderate" } },
    "Orange":           { organs: ["Immune","Cardiovascular"],            nutrients: { vitamin_c:"high", hesperidin:"moderate", fiber:"moderate" } },
    "Kiwi":             { organs: ["Immune","Gut"],                       nutrients: { vitamin_c:"very high", fiber:"moderate", vitamin_k:"moderate" } },
    "Turmeric Root + black pepper": { organs: ["Brain","Liver","Joints"], nutrients: { curcumin:"high", antioxidants:"high" } },
    "Garlic":           { organs: ["Heart","Immune"],                     nutrients: { allicin:"high", sulfur_compounds:"high" } },
    "Ginger Root":      { organs: ["Gut","Brain"],                        nutrients: { gingerols:"high", antioxidants:"moderate" } },
    "Burdock Root":     { organs: ["Liver","Gut"],                        nutrients: { inulin:"high", antioxidants:"moderate", fiber:"moderate" } },
    "Brown Flaxseed":   { organs: ["Heart","Gut","Brain"],                nutrients: { omega_3:"high", lignans:"high", fiber:"high" } },
    "Pumpkin Seeds":    { organs: ["Prostate","Brain","Immune"],          nutrients: { magnesium:"high", zinc:"moderate", iron:"moderate" } },
    "Brazil Nuts":      { organs: ["Brain","Heart","Immune","Cellular"],  nutrients: { selenium:"very high", vitamin_e:"high", antioxidants:"high", magnesium:"moderate" } }
};

/* ====================================================
   STATE
   ==================================================== */
let selectedItems        = [];
let savedCurrentWeekData = null;

const NUTRIENT_LEVELS = { "low":1, "moderate":2, "high":3, "very high":4 };

/* ====================================================
   LOAD SAVED DATA
   ==================================================== */
let currentWeek = localStorage.getItem("currentWeek")
    ? parseInt(localStorage.getItem("currentWeek")) : 0;

let history = localStorage.getItem("shakeHistory")
    ? JSON.parse(localStorage.getItem("shakeHistory")) : [];

/* ====================================================
   PERSISTENT SELECTION PANEL
   ==================================================== */
function updateSelectionPanel() {
    const panel = document.getElementById("selectionPanel");
    const body  = document.getElementById("panelBody");

    if (selectedItems.length === 0) {
        panel.style.display = "none";
        body.innerHTML = "";
        return;
    }

    panel.style.display = "block";

    // Selected ingredient chips
    const chipHTML = selectedItems
        .map(i => "<span class='item-chip'>" + i + "</span>")
        .join("");

    // Merged organ map — sorted by frequency
    const organMap = {};
    selectedItems.forEach(item => {
        const data = nutrientDB[item];
        if (!data) return;
        data.organs.forEach(org => { organMap[org] = (organMap[org] || 0) + 1; });
    });
    const organTags = Object.keys(organMap)
        .sort((a, b) => organMap[b] - organMap[a])
        .map(org => "<span class='organ-tag'>" + org + "</span>")
        .join("");

    // Merged nutrient map — keep highest level per nutrient, sort highest → lowest
    const nutrientMap = {};
    selectedItems.forEach(item => {
        const data = nutrientDB[item];
        if (!data) return;
        for (const [n, level] of Object.entries(data.nutrients)) {
            const existing = nutrientMap[n] ? NUTRIENT_LEVELS[nutrientMap[n]] : 0;
            if ((NUTRIENT_LEVELS[level] || 0) > existing) nutrientMap[n] = level;
        }
    });

    const nutrientRows = Object.entries(nutrientMap)
        .sort((a, b) => (NUTRIENT_LEVELS[b[1]] || 0) - (NUTRIENT_LEVELS[a[1]] || 0))
        .map(([k, v]) =>
            "<div class='nutrient-row'>" +
            k.replace(/_/g, " ") +
            " <span class='nutrient-level'>(" + v + ")</span>" +
            "</div>"
        ).join("");

    body.innerHTML =
        "<div class='chip-row'>" + chipHTML + "</div>" +
        "<hr class='divider'>" +
        "<div class='panel-section'>" +
            "<div class='panel-label'>Supports</div>" +
            "<div class='chip-row'>" + organTags + "</div>" +
        "</div>" +
        "<hr class='divider'>" +
        "<div class='panel-section'>" +
            "<div class='panel-label'>Key nutrients</div>" +
            nutrientRows +
        "</div>";
}

/* ====================================================
   MANUAL SELECTION
   ==================================================== */
function toggleSelect(element, itemName) {
    if (selectedItems.includes(itemName)) {
        selectedItems = selectedItems.filter(i => i !== itemName);
        element.classList.remove("selected");
    } else {
        selectedItems.push(itemName);
        element.classList.add("selected");
    }

    updateSelectionPanel();
}

function clearManualSelections() {
    selectedItems = [];
    document.querySelectorAll(".ingredient").forEach(el => el.classList.remove("selected"));
    updateSelectionPanel();
}

function clearSelection() {
    clearManualSelections();
}

/* ====================================================
   RENDER HELPERS
   ==================================================== */
function renderCategory(label, items) {
    if (!items || items.length === 0) return "";
    return "<div class='category'><strong>" + label + ":</strong>" +
        "<div class='ingredient-group'>" +
        items.map(item =>
            "<span class='ingredient' data-item='" + item.replace(/'/g, "\\'") + "'" +
            " onclick=\"toggleSelect(this,'" + item.replace(/'/g, "\\'") + "')\">" +
            item + "</span>"
        ).join("") +
        "</div></div>";
}

/* ====================================================
   WEEK DATA & DISPLAY
   ==================================================== */
function getWeekData(weekNumber) {
    const wi = weekNumber % 4;
    return {
        week:       wi + 1,
        vegetables: [leafyGreens[wi], cruciferous[wi], supplementalVeg[wi]],
        fruits:     [fruits[(wi*2) % fruits.length], fruits[(wi*2+1) % fruits.length]],
        roots:      [roots[(wi*2) % roots.length],   roots[(wi*2+1) % roots.length]],
        seeds
    };
}

function displayWeek(data) {
    savedCurrentWeekData = data;
    document.getElementById("weekTitle").innerText = "Week " + data.week;
    document.getElementById("ingredients").innerHTML =
        renderCategory("Vegetables", data.vegetables) +
        renderCategory("Fruits",     data.fruits) +
        renderCategory("Roots",      data.roots) +
        renderCategory("Seeds",      data.seeds);
}

/* ====================================================
   NAVIGATION — organ filter persists
   ==================================================== */
function navigateWeek(newWeek) {
    const card = document.getElementById("shakeCard");
    card.classList.add("fade");
    setTimeout(() => {
        currentWeek = newWeek;
        selectedItems = [];
        document.querySelectorAll(".ingredient").forEach(el => el.classList.remove("selected"));
        updateSelectionPanel();
        displayWeek(getWeekData(currentWeek));
        saveHistory(currentWeek);
        localStorage.setItem("currentWeek", currentWeek);
        card.classList.remove("fade");
    }, 300);
}

function previousWeek() { navigateWeek(currentWeek === 0 ? 3 : currentWeek - 1); }
function nextWeek()      { navigateWeek(currentWeek === 3 ? 0 : currentWeek + 1); }

/* ====================================================
   HISTORY
   ==================================================== */
function saveHistory(weekNumber) {
    history = [];
    for (let i = 0; i <= weekNumber; i++) history.push(getWeekData(i));
    localStorage.setItem("shakeHistory", JSON.stringify(history));
    renderHistory();
}

function renderHistory() {
    const list = document.getElementById("historyList");
    list.innerHTML = "";
    const n = currentWeek + 1;
    for (let i = 0; i < n && i < history.length; i++) {
        const item = history[i];
        const li = document.createElement("li");
        li.innerText = "Week " + item.week + ": " +
            item.vegetables.join(", ") + " | " +
            item.fruits.join(", ") + " | " +
            item.roots.join(", ") + " | " +
            item.seeds.join(", ");
        list.appendChild(li);
    }
}

function toggleHistory() {
    const list = document.getElementById("historyList");
    list.style.display = list.style.display === "none" ? "block" : "none";
}

/* ====================================================
   INITIAL LOAD
   ==================================================== */
if (history.length > 0) {
    if (currentWeek >= history.length) {
        currentWeek = history.length - 1;
        localStorage.setItem("currentWeek", currentWeek);
    }
    displayWeek(history[currentWeek]);
} else {
    currentWeek = 0;
    saveHistory(0);
    displayWeek(getWeekData(0));
}

renderHistory();
</script>
</body>
</html>
